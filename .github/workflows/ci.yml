name: CI

on:
  push:
    branches: [main]
  pull_request:

# Mirrors the Continuous Quality Gates pipeline in docs/05_QUALITY.md §16.
jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit & integration tests
        run: npm run test

      - name: Build
        run: npm run build
